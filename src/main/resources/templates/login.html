<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dang nhap - Phenikaa HR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: url('/images/background.jpg') no-repeat center center fixed; 
            background-size: cover; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
        }
        .login-card { max-width: 400px; margin: auto; }
        .logo { width: 100px; margin-bottom: 20px; }
        .card-blue { 
            background: linear-gradient(135deg, #1a5a8c 0%, #0d3a5c 100%); 
            border: none; 
            border-radius: 15px;
        }
        .card-blue .form-label { color: white; }
        .card-blue h4, .card-blue h6 { color: white; }
        .card-blue .form-control { 
            background: rgba(255,255,255,0.9); 
            border: none; 
        }
        .card-blue .alert-danger { 
            background: rgba(220,53,69,0.9); 
            border: none; 
            color: white; 
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="card card-blue shadow-lg">
                <div class="card-body text-center p-5">
                    <img th:src="@{/images/logo.png}" class="logo" alt="Logo">
                    <h4 class="mb-3">He thong Quan ly Nhan su</h4>
                    <h6 class="mb-4" style="opacity: 0.8;">Dai hoc Phenikaa</h6>
                    
                    <div th:if="${param.error}" class="alert alert-danger">Email hoac mat khau khong dung</div>
                    <div th:if="${param.logout}" class="alert alert-info">Da dang xuat</div>
                    
                    <form th:action="@{/login}" method="post">
                        <div class="mb-3 text-start">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" name="username" placeholder="admin@phenikaa.edu.vn" required>
                        </div>
                        <div class="mb-3 text-start">
                            <label class="form-label">Mat khau</label>
                            <input type="password" class="form-control" name="password" placeholder="123456" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Dang nhap</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
