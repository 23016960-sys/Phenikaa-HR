<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiet Nhan vien - Phenikaa HR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .sidebar { position: fixed; left: 0; top: 0; width: 220px; height: 100vh; background: linear-gradient(180deg, #1a3a5c, #0f2844); color: white; padding-top: 20px; }
        .sidebar img { width: 60px; display: block; margin: 0 auto 10px; }
        .sidebar h6 { text-align: center; font-size: 12px; margin-bottom: 30px; }
        .sidebar a { display: block; color: rgba(255,255,255,0.8); padding: 12px 20px; text-decoration: none; }
        .sidebar a:hover, .sidebar a.active { background: rgba(255,255,255,0.1); color: white; border-left: 3px solid #f5a623; }
        .main { margin-left: 220px; padding: 20px; background: #f5f6fa; min-height: 100vh; }
        .badge-hc { background: #27ae60; }
        .badge-hd { background: #e67e22; }
    </style>
</head>
<body>
    <div class="sidebar">
        <img th:src="@{/images/logo.png}" alt="Logo">
        <h6>QUAN LY NHAN SU<br>Dai hoc Phenikaa</h6>
        <a href="/nhanvien">Danh sach nhan vien</a>
        <a href="/nhanvien/them">Them nhan vien</a>
        <a href="/nhanvien/luong">Tinh luong</a>
        <hr style="border-color: rgba(255,255,255,0.2); margin: 20px;">
        <form th:action="@{/logout}" method="post" style="padding: 0 20px;">
            <button type="submit" class="btn btn-outline-light btn-sm w-100">Dang xuat</button>
        </form>
    </div>
    <div class="main">
        <h4 class="mb-3">Chi tiet Nhan vien</h4>
        <div class="row">
            <div class="col-md-6">
                <div class="card mb-3">
                    <div class="card-header"><strong>Thong tin co ban</strong></div>
                    <div class="card-body">
                        <table class="table table-borderless mb-0">
                            <tr><th width="150">Ma NV:</th><td th:text="${nhanVien.maNhanVien}"></td></tr>
                            <tr><th>Ho ten:</th><td th:text="${nhanVien.hoTen}"></td></tr>
                            <tr><th>Truong:</th><td th:text="${nhanVien.truong}"></td></tr>
                            <tr><th>Khoa:</th><td th:text="${nhanVien.khoa}"></td></tr>
                            <tr><th>Chuc vu:</th><td th:text="${nhanVien.chucVu}"></td></tr>
                            <tr><th>Loai NV:</th><td>
                                <span th:if="${nhanVien.loaiNhanVien == 'Hanh chinh'}" class="badge badge-hc">Hanh chinh</span>
                                <span th:if="${nhanVien.loaiNhanVien == 'Hop dong'}" class="badge badge-hd">Hop dong</span>
                            </td></tr>
                            <tr><th>Email:</th><td th:text="${nhanVien.email}"></td></tr>
                            <tr><th>SDT:</th><td th:text="${nhanVien.soDienThoai}"></td></tr>
                        </table>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card mb-3">
                    <div class="card-header"><strong>Thong tin luong</strong></div>
                    <div class="card-body">
                        <table class="table table-borderless mb-0">
                            <tr><th width="150">He so luong:</th><td th:text="${nhanVien.heSo}"></td></tr>
                            <tr><th>Luong co ban:</th><td th:text="${#numbers.formatDecimal(nhanVien.luongCoBan, 0, 'COMMA', 0, 'POINT')} + ' VND'"></td></tr>
                            <tr><th>Phu cap an trua:</th><td th:text="${#numbers.formatDecimal(nhanVien.phuCapAnTrua, 0, 'COMMA', 0, 'POINT')} + ' VND'"></td></tr>
                            <tr><th>Phu cap xang xe:</th><td th:text="${#numbers.formatDecimal(nhanVien.phuCapXangXe, 0, 'COMMA', 0, 'POINT')} + ' VND'"></td></tr>
                            <tr class="table-warning"><th>TONG LUONG:</th><td><strong th:text="${#numbers.formatDecimal(nhanVien.tongLuong, 0, 'COMMA', 0, 'POINT')} + ' VND'"></strong></td></tr>
                        </table>
                    </div>
                </div>
            </div>
        </div>
        <div class="mt-2">
            <a th:href="@{/nhanvien/sua/{id}(id=${nhanVien.id})}" class="btn btn-warning">Sua</a>
            <a href="/nhanvien" class="btn btn-secondary">Quay lai</a>
        </div>
    </div>
</body>
</html>
