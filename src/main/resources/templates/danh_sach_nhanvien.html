<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sach Nhan vien - Phenikaa HR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .sidebar { position: fixed; left: 0; top: 0; width: 220px; height: 100vh; background: linear-gradient(180deg, #1a3a5c, #0f2844); color: white; padding-top: 20px; }
        .sidebar img { width: 60px; display: block; margin: 0 auto 10px; }
        .sidebar h6 { text-align: center; font-size: 12px; margin-bottom: 30px; }
        .sidebar a { display: block; color: rgba(255,255,255,0.8); padding: 12px 20px; text-decoration: none; }
        .sidebar a:hover, .sidebar a.active { background: rgba(255,255,255,0.1); color: white; border-left: 3px solid #f5a623; }
        .main { margin-left: 220px; padding: 20px; background: #f5f6fa; min-height: 100vh; }
        .badge-hc { background: #27ae60; }
        .badge-hd { background: #e67e22; }
    </style>
</head>
<body>
    <div class="sidebar">
        <img th:src="@{/images/logo.png}" alt="Logo">
        <h6>QUAN LY NHAN SU<br>Dai hoc Phenikaa</h6>
        <a href="/nhanvien" class="active">Danh sach nhan vien</a>
        <a href="/nhanvien/them">Them nhan vien</a>
        <a href="/nhanvien/luong">Tinh luong</a>
        <hr style="border-color: rgba(255,255,255,0.2); margin: 20px;">
        <form th:action="@{/logout}" method="post" style="padding: 0 20px;">
            <button type="submit" class="btn btn-outline-light btn-sm w-100">Dang xuat</button>
        </form>
    </div>
    <div class="main">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4>Danh sach Nhan vien</h4>
            <a href="/nhanvien/them" class="btn btn-success">+ Them nhan vien</a>
        </div>
        <div class="card">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>Ma NV</th>
                            <th>Ho ten</th>
                            <th>Truong</th>
                            <th>Khoa</th>
                            <th>Chuc vu</th>
                            <th>Loai NV</th>
                            <th>Tong luong</th>
                            <th>Thao tac</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="nv : ${danhSachNhanVien}">
                            <td th:text="${nv.maNhanVien}"></td>
                            <td th:text="${nv.hoTen}"></td>
                            <td th:text="${nv.truong}"></td>
                            <td th:text="${nv.khoa}"></td>
                            <td th:text="${nv.chucVu}"></td>
                            <td>
                                <span th:if="${nv.loaiNhanVien == 'Hanh chinh'}" class="badge badge-hc">Hanh chinh</span>
                                <span th:if="${nv.loaiNhanVien == 'Hop dong'}" class="badge badge-hd">Hop dong</span>
                            </td>
                            <td><strong th:text="${#numbers.formatDecimal(nv.tongLuong, 0, 'COMMA', 0, 'POINT')} + ' VND'"></strong></td>
                            <td>
                                <a th:href="@{/nhanvien/xem/{id}(id=${nv.id})}" class="btn btn-info btn-sm">Xem</a>
                                <a th:href="@{/nhanvien/sua/{id}(id=${nv.id})}" class="btn btn-warning btn-sm">Sua</a>
                                <a th:href="@{/nhanvien/xoa/{id}(id=${nv.id})}" class="btn btn-danger btn-sm" onclick="return confirm('Xoa?')">Xoa</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
