<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Them Nhan vien - Phenikaa HR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .sidebar { position: fixed; left: 0; top: 0; width: 220px; height: 100vh; background: linear-gradient(180deg, #1a3a5c, #0f2844); color: white; padding-top: 20px; }
        .sidebar img { width: 60px; display: block; margin: 0 auto 10px; }
        .sidebar h6 { text-align: center; font-size: 12px; margin-bottom: 30px; }
        .sidebar a { display: block; color: rgba(255,255,255,0.8); padding: 12px 20px; text-decoration: none; }
        .sidebar a:hover, .sidebar a.active { background: rgba(255,255,255,0.1); color: white; border-left: 3px solid #f5a623; }
        .main { margin-left: 220px; padding: 20px; background: #f5f6fa; min-height: 100vh; }
    </style>
</head>
<body>
    <div class="sidebar">
        <img th:src="@{/images/logo.png}" alt="Logo">
        <h6>QUAN LY NHAN SU<br>Dai hoc Phenikaa</h6>
        <a href="/nhanvien">Danh sach nhan vien</a>
        <a href="/nhanvien/them" class="active">Them nhan vien</a>
        <a href="/nhanvien/luong">Tinh luong</a>
        <hr style="border-color: rgba(255,255,255,0.2); margin: 20px;">
        <form th:action="@{/logout}" method="post" style="padding: 0 20px;">
            <button type="submit" class="btn btn-outline-light btn-sm w-100">Dang xuat</button>
        </form>
    </div>
    <div class="main">
        <h4 class="mb-3">Them Nhan vien moi</h4>
        <div class="card">
            <div class="card-body">
                <form th:action="@{/nhanvien/them}" method="post" th:object="${nhanVien}">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Ma nhan vien</label>
                            <input type="text" class="form-control" th:field="*{maNhanVien}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Ho va ten</label>
                            <input type="text" class="form-control" th:field="*{hoTen}" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Truong</label>
                            <select class="form-select" th:field="*{truong}" id="truongSelect" required>
                                <option value="">-- Chon truong --</option>
                                <option value="Truong CNTT">Truong CNTT</option>
                                <option value="Truong Ky thuat">Truong Ky thuat</option>
                                <option value="Truong Kinh te">Truong Kinh te</option>
                                <option value="Truong Y-Duoc">Truong Y-Duoc</option>
                                <option value="Truong Ngoai ngu-KHXH">Truong Ngoai ngu-KHXH</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Khoa</label>
                            <select class="form-select" th:field="*{khoa}" id="khoaSelect" required>
                                <option value="">-- Chon khoa --</option>
                            </select>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Chuc vu</label>
                            <select class="form-select" th:field="*{chucVu}" required>
                                <option value="">-- Chon chuc vu --</option>
                                <option value="Truong khoa">Truong khoa (HS: 6.5)</option>
                                <option value="Pho khoa">Pho khoa (HS: 5.5)</option>
                                <option value="Giang vien chinh">Giang vien chinh (HS: 5.0)</option>
                                <option value="Giang vien">Giang vien (HS: 4.0)</option>
                                <option value="Nhan vien hanh chinh">Nhan vien hanh chinh (HS: 2.5)</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Loai nhan vien</label>
                            <select class="form-select" th:field="*{loaiNhanVien}" required>
                                <option value="Hanh chinh">Hanh chinh (Bien che)</option>
                                <option value="Hop dong">Hop dong</option>
                            </select>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Phu cap an trua (VND)</label>
                            <input type="number" class="form-control" th:field="*{phuCapAnTrua}" value="500000">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Phu cap xang xe (VND)</label>
                            <input type="number" class="form-control" th:field="*{phuCapXangXe}" value="300000">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">So dien thoai</label>
                            <input type="text" class="form-control" th:field="*{soDienThoai}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" th:field="*{email}">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Luu nhan vien</button>
                    <a href="/nhanvien" class="btn btn-secondary">Huy</a>
                </form>
            </div>
        </div>
    </div>
    <script>
        const khoaData = {
            'Truong CNTT': ['Khoa hoc may tinh', 'Ky thuat phan mem', 'He thong thong tin'],
            'Truong Ky thuat': ['Co khi', 'Dien-Dien tu', 'Xay dung'],
            'Truong Kinh te': ['Quan tri kinh doanh', 'Tai chinh-Ngan hang', 'Ke toan'],
            'Truong Y-Duoc': ['Y', 'Duoc', 'Dieu duong'],
            'Truong Ngoai ngu-KHXH': ['Tieng Anh', 'Truyen thong', 'Du lich']
        };
        document.getElementById('truongSelect').addEventListener('change', function() {
            const khoaSelect = document.getElementById('khoaSelect');
            khoaSelect.innerHTML = '<option value="">-- Chon khoa --</option>';
            const khoas = khoaData[this.value] || [];
            khoas.forEach(k => {
                const opt = document.createElement('option');
                opt.value = 'Khoa ' + k;
                opt.textContent = 'Khoa ' + k;
                khoaSelect.appendChild(opt);
            });
        });
    </script>
</body>
</html>
